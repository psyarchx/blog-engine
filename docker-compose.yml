services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-engine-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog_engine"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
